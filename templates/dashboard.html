<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ project_name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-black-900 text-white flex items-center justify-center min-h-screen">

    <!-- APP CONTAINER -->
    <div id="app" class="w-[380px] h-[700px] bg-white-100 rounded-3xl shadow-2xl overflow-hidden relative">

        <!-- PHONE STATUS BAR (pure decoration) -->
        <div class="h-6 bg-red-200"></div>

        <!-- ===================== -->
        <!-- SCREEN: LOGIN -->
        <!-- ===================== -->
        <div id="screen-login" class="screen hidden p-6">
            <h1 class="text-2xl font-bold mb-4">Login</h1>
            <button class="bg-red-500 px-4 py-2 rounded">Go to Setup</button>
        </div>

        <!-- ===================== -->
        <!-- SCREEN: SETUP -->
        <!-- ===================== -->
        <div id="screen-setup" class="screen hidden p-6">
            <h1 class="text-2xl font-bold mb-4">Setup</h1>
            <button class="bg-red-500 px-4 py-2 rounded">Go to Home</button>
        </div>

        <!-- ===================== -->
        <!-- SCREEN: HOME -->
        <!-- ===================== -->
        <div id="screen-home" class="screen hidden p-6 flex flex-col h-full">
            
            <!-- SPENDING CIRCLE -->
            <div class="flex justify-center mb-4">
                <div class="relative w-72 h-72">
                    <!-- Circle with thick stroke (1/8 radius outer visible) -->
                    <svg class="w-full h-full" viewBox="0 0 288 288">
                        <!-- Spending ring - categories will be represented as segments -->
                        <!-- Red category segments (currently only spending) -->
                        <circle cx="144" cy="144" r="120" fill="none" stroke=var(--brandRed) stroke-width="30" stroke-dasharray="300.37 753.98"/>
                        
                        <!-- Empty space for future categories -->
                        <circle cx="144" cy="144" r="120" fill="none" stroke="var(--bg)" stroke-width="30" stroke-dasharray="453.61 753.98" stroke-dashoffset="-300.37"/>
                    </svg>
                    
                    <!-- Center content with category labels -->
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="bg-white-100 rounded-full w-52 h-52 flex flex-col items-center justify-center">
                            <!-- Category dot and label -->
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 rounded-full" style="background-color: var(--brandRed);"></div>
                                <span class="text-sm font-medium" style="color: var(--dark);">Траты</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>



        <!-- ===================== -->
        <!-- SCREEN: LIMITS -->
        <!-- ===================== -->
        <div id="screen-limits" class="screen p-6 flex flex-col h-full">
            
            <!-- ACTION BUTTONS -->
            <div class="flex gap-2 mb-6">
                <!-- Add Category Button -->
                <button class="flex-grow h-16 rounded-2xl font-semibold text-sm flex items-center justify-center" style="background-color: var(--dark); color: var(--bg);">
                    + категория
                </button>
                
                <!-- Coin Button -->
                <button class="w-16 h-16 rounded-r-2xl flex items-center justify-center flex-shrink-0" style="background-color: var(--uiRed);">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" style="color: var(--bg);">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 6v12M9 9h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>

            <!-- CATEGORIES LIST -->
            <div class="flex-grow overflow-y-auto">
                
                <!-- CATEGORY: Траты -->
                <div class="mb-4">
                    <!-- Category Name -->
                    <p class="text-xs font-medium mb-2" style="color: var(--gray);">Траты</p>
                    
                    <!-- Category Block -->
                    <div class="h-12 rounded-2xl overflow-hidden" style="background-color: var(--light-gray);">
                        <!-- Progress Fill -->
                        <div class="h-full w-2/3 rounded-2xl" style="background-color: var(--brandRed); transition: width 0.3s ease;"></div>
                    </div>
                </div>

            </div>

        </div>



            <!-- CALENDAR/TRANSACTIONS LIST -->
            <div class="flex-shrink-0 mb-6 rounded-xl overflow-hidden" style="border: 2px solid var(--light-gray); background-color: var(--bg);">
                <!-- Calendar rows (transaction items) -->
                <div class="divide-y-2" style="border-color: var(--light-gray);">
                    <!-- Row 1 -->
                    <div class="grid gap-0" style="grid-template-columns: 50px 1fr 70px;">
                        <div class="p-3 text-center text-xs font-medium" style="background-color: var(--light-gray); color: var(--dark); border-right: 2px solid var(--light-gray);">10.05</div>
                        <div class="p-3 text-xs" style="color: var(--gray); border-right: 2px solid var(--light-gray);">Кофе</div>
                        <div class="p-3 text-center text-xs font-medium" style="color: var(--gray);">-150₽</div>
                    </div>
                    
                    <!-- Row 2 -->
                    <div class="grid gap-0" style="grid-template-columns: 50px 1fr 70px;">
                        <div class="p-3 text-center text-xs font-medium" style="background-color: var(--light-gray); color: var(--dark); border-right: 2px solid var(--light-gray);">09.05</div>
                        <div class="p-3 text-xs" style="color: var(--gray); border-right: 2px solid var(--light-gray);">Продукты</div>
                        <div class="p-3 text-center text-xs font-medium" style="color: var(--gray);">-850₽</div>
                    </div>
                    
                    <!-- Row 3 -->
                    <div class="grid gap-0" style="grid-template-columns: 50px 1fr 70px;">
                        <div class="p-3 text-center text-xs font-medium" style="background-color: var(--light-gray); color: var(--dark); border-right: 2px solid var(--light-gray);">08.05</div>
                        <div class="p-3 text-xs" style="color: var(--gray); border-right: 2px solid var(--light-gray);">Такси</div>
                        <div class="p-3 text-center text-xs font-medium" style="color: var(--gray);">-320₽</div>
                    </div>

                    <!-- Row 4 -->
                    <div class="grid gap-0" style="grid-template-columns: 50px 1fr 70px;">
                        <div class="p-3 text-center text-xs font-medium" style="background-color: var(--light-gray); color: var(--dark); border-right: 2px solid var(--light-gray);">07.05</div>
                        <div class="p-3 text-xs" style="color: var(--gray); border-right: 2px solid var(--light-gray);">Обед</div>
                        <div class="p-3 text-center text-xs font-medium" style="color: var(--gray);">-580₽</div>
                    </div>

                    <!-- Row 5 -->
                    <div class="grid gap-0" style="grid-template-columns: 50px 1fr 70px;">
                        <div class="p-3 text-center text-xs font-medium" style="background-color: var(--light-gray); color: var(--dark); border-right: 2px solid var(--light-gray);">06.05</div>
                        <div class="p-3 text-xs" style="color: var(--gray); border-right: 2px solid var(--light-gray);">Бензин</div>
                        <div class="p-3 text-center text-xs font-medium" style="color: var(--gray);">-1200₽</div>
                    </div>
                </div>
            </div>

            <!-- GOAL PROGRESS BAR -->
            <div class="flex-shrink-0">
                <!-- Goal label -->
                <p class="mb-3 text-sm font-medium" style="color: var(--gray);">Цель: а</p>
                
                <!-- Progress bar container -->
                <div class="w-full h-3 rounded-full overflow-hidden" style="background-color: var(--light-gray);">
                    <!-- Progress fill -->
                    <div class="h-full w-2/3 rounded-full" style="background-color: var(--brandRed); transition: width 0.3s ease;"></div>
                </div>
            </div>

        </div>

        <!-- ===================== -->
        <!-- SCREEN: FRIENDS -->
        <!-- ===================== -->
        <div id="screen-friends" class="screen hidden p-6">
            <h1 class="text-2xl font-bold mb-4">Friends</h1>
        </div>

        <!-- ===================== -->
        <!-- SCREEN: STATS -->
        <!-- ===================== -->
        <div id="screen-stats" class="screen hidden p-6">
            <h1 class="text-2xl font-bold mb-4">Stats</h1>
        </div>

    </div>

</body>
</html>
